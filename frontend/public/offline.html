<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>AIFUS 2026 | Hors ligne</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, sans-serif;
        background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        color: #0f172a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(100%, 440px);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(148, 163, 184, 0.22);
        box-shadow: 0 24px 60px -32px rgba(15, 23, 42, 0.35);
        padding: 28px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        background: #e0f2fe;
        color: #0369a1;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        padding: 8px 12px;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #0ea5e9;
      }

      h1 {
        margin: 18px 0 10px;
        font-size: 28px;
        line-height: 1.15;
      }

      p {
        margin: 0 0 18px;
        color: #475569;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        border-radius: 999px;
        padding: 0 18px;
        background: #0f172a;
        color: white;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <div class="badge">
        <span class="dot"></span>
        Hors ligne
      </div>
      <h1>La connexion est indisponible</h1>
      <p>
        L'application AIFUS 2026 est installee, mais certaines donnees demandent
        encore une connexion Internet pour se synchroniser.
      </p>
      <a href="/">Revenir a l'accueil</a>
    </section>
  </body>
</html>
