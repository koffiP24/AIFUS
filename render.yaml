services:
  - type: web
    name: aifus-backend
    runtime: node
    rootDir: backend
    buildCommand: npm run render:build && npm run render:predeploy
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://aifus-1.onrender.com
      - key: FRONTEND_URLS
        value: https://aifus-1.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_IDS
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: PAYMENT_WEBHOOK_SECRET
        sync: false
      - key: GENIUSPAY_API_KEY
        sync: false
      - key: GENIUSPAY_API_SECRET
        sync: false
      - key: GENIUSPAY_WEBHOOK_SECRET
        sync: false
      - key: GENIUSPAY_ENV
        value: sandbox
      - key: GENIUSPAY_RETURN_URL
        value: https://aifus-1.onrender.com/payment-return
      - key: GENIUSPAY_WEBHOOK_URL
        value: https://aifus.onrender.com/api/v2/payments/webhook
      - key: QR_SIGNING_SECRET
        sync: false
      - key: V2_ACCESS_TOKEN_EXPIRES_IN
        value: 15m
      - key: V2_REFRESH_TOKEN_TTL_DAYS
        value: 30
      - key: ORDER_RESERVATION_TTL_MINUTES
        value: 10
      - key: V2_ADMIN_EMAIL
        sync: false
      - key: V2_ADMIN_PASSWORD
        sync: false
      - key: V2_ADMIN_FIRST_NAME
        value: Admin
      - key: V2_ADMIN_LAST_NAME
        value: AIFUS

  - type: web
    name: aifus-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://aifus.onrender.com/api
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
