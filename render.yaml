services:
  - type: web
    name: aifus-backend
    runtime: node
    rootDir: backend
    buildCommand: npm run render:build
    preDeployCommand: npm run render:predeploy
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://aifus.vercel.app
      - key: FRONTEND_URLS
        value: https://aifus.vercel.app
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_IDS
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: PAYMENT_WEBHOOK_SECRET
        sync: false
      - key: FEDAPAY_SECRET_KEY
        sync: false
      - key: FEDAPAY_ENV
        value: sandbox
      - key: FEDAPAY_WEBHOOK_SECRET
        sync: false
      - key: FEDAPAY_RETURN_URL
        value: https://aifus.vercel.app/payment-return
      - key: FEDAPAY_CALLBACK_URL
        value: https://aifus.vercel.app/payment-return
      - key: FEDAPAY_WEBHOOK_URL
        value: https://aifus.onrender.com/api/v2/payments/webhook
      - key: FEDAPAY_PHONE_COUNTRY
        value: ci
      - key: QR_SIGNING_SECRET
        sync: false
      - key: V2_ACCESS_TOKEN_EXPIRES_IN
        value: 15m
      - key: V2_REFRESH_TOKEN_TTL_DAYS
        value: 30
      - key: ORDER_RESERVATION_TTL_MINUTES
        value: 10
      - key: V2_ADMIN_EMAIL
        sync: false
      - key: V2_ADMIN_PASSWORD
        sync: false
      - key: V2_ADMIN_FIRST_NAME
        value: Admin
      - key: V2_ADMIN_LAST_NAME
        value: AIFUS
